<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Architecture Diagram -->
  <rect width="800" height="400" rx="12" fill="#111"/>
  <rect x="1" y="1" width="798" height="398" rx="11" stroke="#222" stroke-width="1"/>
  <!-- Title -->
  <rect x="300" y="16" width="200" height="14" rx="3" fill="#f5a623" opacity="0.3"/>
  <!-- Frontend Layer -->
  <rect x="50" y="60" width="200" height="120" rx="10" fill="#161616" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  <rect x="100" y="52" width="100" height="16" rx="4" fill="#111"/>
  <text x="120" y="64" font-family="monospace" font-size="10" fill="#f5a623" opacity="0.8">FRONTEND</text>
  <rect x="70" y="82" width="80" height="20" rx="4" fill="#f5a623" opacity="0.12"/>
  <text x="82" y="96" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.6">React 19</text>
  <rect x="160" y="82" width="72" height="20" rx="4" fill="#f5a623" opacity="0.12"/>
  <text x="166" y="96" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.6">TypeScript</text>
  <rect x="70" y="112" width="70" height="20" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="80" y="126" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.5">MUI v7</text>
  <rect x="150" y="112" width="82" height="20" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="156" y="126" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.5">TanStack Q</text>
  <rect x="70" y="142" width="65" height="20" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="78" y="156" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.5">Zustand</text>
  <rect x="145" y="142" width="87" height="20" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="153" y="156" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.5">React Router</text>
  <!-- Arrow Frontend → State -->
  <line x1="250" y1="120" x2="300" y2="120" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>
  <polygon points="298,115 308,120 298,125" fill="#f5a623" opacity="0.4"/>
  <!-- State Management Layer -->
  <rect x="310" y="80" width="180" height="80" rx="10" fill="#161616" stroke="#f5a623" stroke-width="1" opacity="0.5"/>
  <rect x="350" y="72" width="100" height="16" rx="4" fill="#111"/>
  <text x="358" y="84" font-family="monospace" font-size="10" fill="#f5a623" opacity="0.7">STATE LAYER</text>
  <rect x="326" y="100" width="72" height="18" rx="4" fill="#f5a623" opacity="0.1"/>
  <text x="334" y="113" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.5">Server State</text>
  <rect x="406" y="100" width="70" height="18" rx="4" fill="#f5a623" opacity="0.1"/>
  <text x="414" y="113" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.5">Client State</text>
  <rect x="326" y="128" width="148" height="18" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="356" y="141" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.4">Cache + Invalidation</text>
  <!-- Arrow State → API -->
  <line x1="490" y1="120" x2="540" y2="120" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>
  <polygon points="538,115 548,120 538,125" fill="#f5a623" opacity="0.4"/>
  <!-- API Layer -->
  <rect x="550" y="60" width="200" height="120" rx="10" fill="#161616" stroke="#f5a623" stroke-width="1" opacity="0.5"/>
  <rect x="606" y="52" width="90" height="16" rx="4" fill="#111"/>
  <text x="620" y="64" font-family="monospace" font-size="10" fill="#f5a623" opacity="0.7">BACKEND</text>
  <rect x="570" y="82" width="60" height="18" rx="4" fill="#f5a623" opacity="0.1"/>
  <text x="578" y="95" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.5">REST API</text>
  <rect x="640" y="82" width="90" height="18" rx="4" fill="#f5a623" opacity="0.1"/>
  <text x="648" y="95" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.5">WebSocket</text>
  <rect x="570" y="110" width="160" height="18" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="596" y="123" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.4">Authentication Layer</text>
  <rect x="570" y="138" width="80" height="18" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="578" y="151" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.4">Threat Intel</text>
  <rect x="660" y="138" width="70" height="18" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="668" y="151" font-family="monospace" font-size="8" fill="#f5a623" opacity="0.4">Analytics</text>
  <!-- UI Components Layer (bottom) -->
  <rect x="100" y="230" width="600" height="80" rx="10" fill="#161616" stroke="#222" stroke-width="1"/>
  <rect x="310" y="222" width="180" height="16" rx="4" fill="#111"/>
  <text x="328" y="234" font-family="monospace" font-size="10" fill="#f5a623" opacity="0.6">COMPONENT LIBRARY</text>
  <rect x="120" y="252" width="70" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="128" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Data Grids</text>
  <rect x="200" y="252" width="60" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="210" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Charts</text>
  <rect x="270" y="252" width="55" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="278" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Forms</text>
  <rect x="335" y="252" width="60" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="343" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Modals</text>
  <rect x="405" y="252" width="55" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="413" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Tables</text>
  <rect x="470" y="252" width="70" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="478" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Loaders</text>
  <rect x="550" y="252" width="80" height="16" rx="4" fill="#f5a623" opacity="0.08"/>
  <text x="558" y="264" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.4">Notifications</text>
  <rect x="120" y="278" width="80" height="16" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="128" y="290" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.35">Error Bounds</text>
  <rect x="210" y="278" width="70" height="16" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="218" y="290" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.35">Skeletons</text>
  <rect x="290" y="278" width="75" height="16" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="298" y="290" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.35">Theme Sys</text>
  <rect x="375" y="278" width="85" height="16" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="383" y="290" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.35">Route Guards</text>
  <rect x="470" y="278" width="65" height="16" rx="4" fill="#f5a623" opacity="0.06"/>
  <text x="478" y="290" font-family="monospace" font-size="7" fill="#f5a623" opacity="0.35">Drawers</text>
  <!-- Connector lines -->
  <line x1="150" y1="180" x2="150" y2="230" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="160" x2="400" y2="230" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="650" y1="180" x2="650" y2="230" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Build tooling (bottom) -->
  <rect x="200" y="340" width="400" height="40" rx="8" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <text x="310" y="365" font-family="monospace" font-size="10" fill="#555">Vite · ESLint · Vitest · Git</text>
  <line x1="400" y1="310" x2="400" y2="340" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
