server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip Compression ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        image/png
        image/jpeg
        font/woff
        font/woff2;

    # ─── Security Headers ───────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP: allow CDN scripts (Three.js, GSAP) and Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # ─── ETag support ──────────────────────────────────────
    etag on;

    # ─── Cache: Images & Fonts (30 days) ────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─── Cache: CSS & JS (7 days) ───────────────────────────
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─── HTML Pages (no cache — always fresh) ───────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── Main Routes ────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ─── Custom 404 ─────────────────────────────────────────
    error_page 404 /index.html;

    # ─── Block hidden files (.DS_Store, .git, etc.) ─────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Logging (compact for free tier) ────────────────────
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;
}
